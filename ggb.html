<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GeoGebra</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; }
    #ggb-root { width: 100%; height: 100%; }
    #ggb-status { position: fixed; bottom: 4px; right: 6px; font-size: 10px; color: #999; font-family: monospace; }
  </style>
</head>
<body>
  <div id="ggb-root"></div>
  <div id="ggb-status">loading...</div>

  <script src="https://www.geogebra.org/apps/deployggb.js"></script>
  <script>
    var statusEl = document.getElementById('ggb-status');
    function log(msg) {
      console.log('[ggb.html]', msg);
      statusEl.textContent = msg;
    }

    // ── URL 파라미터 파싱 ──
    var cmds = [];
    try {
      var raw = new URLSearchParams(location.search).get('cmds');
      cmds = raw ? JSON.parse(decodeURIComponent(raw)) : [];
      log('cmds 파싱 완료: ' + cmds.length + '개');
    } catch(e) {
      log('cmds 파싱 실패: ' + e.message);
    }

    // ── GGBApplet 확인 ──
    if (typeof GGBApplet === 'undefined') {
      log('GGBApplet 미정의 — deployggb.js 로드 실패');
    } else {
      log('GGBApplet 정의됨, inject 시작');

      // appletOnLoad: 함수 레퍼런스 직접 전달 (신버전 API)
      // 콜백 첫 번째 인자로 API 객체 수신
      function onReady(api) {
        log('appletOnLoad 실행, api=' + typeof api);
        var ggb = api || window.ggbApplet;
        if (!ggb) { log('API 객체 없음'); return; }

        cmds.forEach(function(cmd) {
          try {
            var ok = ggb.evalCommand(cmd);
            console.log('[ggb.html] evalCommand("' + cmd + '") =', ok);
          } catch(e) {
            console.warn('[ggb.html] 명령어 실패:', cmd, e.message);
          }
        });

        // 명령어에서 좌표 최댓값 추출해 뷰 범위 설정
        setTimeout(function() {
          try {
            // 모든 숫자 추출해서 범위 계산
            var allNums = cmds.join(' ').match(/-?\d+(\.\d+)?/g) || [];
            var vals = allNums.map(Number).filter(function(n) { return isFinite(n); });
            var maxVal = vals.length ? Math.max.apply(null, vals.map(Math.abs)) : 5;
            var pad = Math.max(1, maxVal * 0.3);
            var lo = -(pad);
            var hi = maxVal + pad;
            ggb.setCoordSystem(lo, hi, lo, hi);
            log('완료 (' + cmds.length + '개 명령, 범위 ' + lo.toFixed(1) + '~' + hi.toFixed(1) + ')');
          } catch(e) {
            try { ggb.setCoordSystem(-1, 6, -1, 6); } catch(e2) {}
            log('완료 (' + cmds.length + '개 명령, fallback 범위)');
          }
        }, 200);
      }

      // 구버전 string 방식 fallback도 등록
      window.ggbOnReady = function() { onReady(window.ggbApplet); };

      try {
        // document.documentElement.clientWidth/Height = iframe 실제 렌더 크기
        var w = document.documentElement.clientWidth || 480;
        var h = document.documentElement.clientHeight || 300;
        var applet = new GGBApplet({
          appName: 'geometry',
          width: w,
          height: h,
          showToolBar: false,
          showAlgebraInput: false,
          showMenuBar: false,
          enableRightClick: false,
          enableShiftDragZoom: true,
          showResetIcon: false,
          showZoomButtons: false,
          language: 'ko',
          scaleContainerClass: 'ggb-root',
          appletOnLoad: onReady
        }, true);

        applet.inject('ggb-root');
        log('inject() 호출됨');
      } catch(e) {
        log('inject 예외: ' + e.message);
        console.error('[ggb.html] inject 예외:', e);
      }
    }
  </script>
</body>
</html>
